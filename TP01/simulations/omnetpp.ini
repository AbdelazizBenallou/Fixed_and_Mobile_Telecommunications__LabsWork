[General]
network = FourLAN
sim-time-limit = 40s

# ======================
# IP + Routing
# ======================
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.assignAddresses = true
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true

*.host*.arp.typename = "GlobalArp"
*.server.arp.typename = "GlobalArp"
*.router*.arp.typename = "GlobalArp"

# ======================
# HTTP Server (LAN3) 
# ======================
*.server.numApps = 1
*.server.app[0].typename = "TcpGenericServerApp"
*.server.app[0].localAddress = ""
*.server.app[0].localPort = 80
*.server.app[0].replyDelay = 0s

# ======================
# host1 (LAN1) → ping host3 + HTTP server
# ======================
*.host1.numApps = 2
*.host1.app[0].typename = "PingApp"
*.host1.app[0].destAddr = "host3"
*.host1.app[0].startTime = 2s
*.host1.app[0].sendInterval = 0.5s
*.host1.app[0].count = 10

*.host1.app[1].typename = "TcpBasicClientApp"
*.host1.app[1].connectAddress = "server"
*.host1.app[1].connectPort = 80
*.host1.app[1].startTime = 3s
*.host1.app[1].numRequestsPerSession = 5
*.host1.app[1].requestLength = 200B
*.host1.app[1].replyLength = 1024B
*.host1.app[1].thinkTime = 0.5s       
*.host1.app[1].idleInterval = 0.5s

# ======================
# host2 (LAN1) → ping host4 + HTTP server
# ======================
*.host2.numApps = 2
*.host2.app[0].typename = "PingApp"
*.host2.app[0].destAddr = "host4"
*.host2.app[0].startTime = 2s
*.host2.app[0].sendInterval = 1s
*.host2.app[0].count = 20

*.host2.app[1].typename = "TcpBasicClientApp"
*.host2.app[1].connectAddress = "server"
*.host2.app[1].connectPort = 80
*.host2.app[1].startTime = 3.5s        # ← offset
*.host2.app[1].numRequestsPerSession = 10
*.host2.app[1].requestLength = 200B
*.host2.app[1].replyLength = 1024B
*.host2.app[1].thinkTime = 0.5s
*.host2.app[1].idleInterval = 0.5s

# ======================
# host3 (LAN2) → ping host1 + HTTP server
# ======================
*.host3.numApps = 2
*.host3.app[0].typename = "PingApp"
*.host3.app[0].destAddr = "host1"
*.host3.app[0].startTime = 2s
*.host3.app[0].sendInterval = 1s
*.host3.app[0].count = 20

*.host3.app[1].typename = "TcpBasicClientApp"
*.host3.app[1].connectAddress = "server"
*.host3.app[1].connectPort = 80
*.host3.app[1].startTime = 3s          # ← offset
*.host3.app[1].numRequestsPerSession = 10
*.host3.app[1].requestLength = 200B
*.host3.app[1].replyLength = 2048B
*.host3.app[1].thinkTime = 0.5s
*.host3.app[1].idleInterval = 0.5s

# ======================
# host4 (LAN2) → ping host2 + HTTP server
# ======================
*.host4.numApps = 2
*.host4.app[0].typename = "PingApp"
*.host4.app[0].destAddr = "host2"
*.host4.app[0].startTime = 2s
*.host4.app[0].sendInterval = 1s
*.host4.app[0].count = 20

*.host4.app[1].typename = "TcpBasicClientApp"
*.host4.app[1].connectAddress = "server"
*.host4.app[1].connectPort = 80
*.host4.app[1].startTime = 3.5s        # ← offset
*.host4.app[1].numRequestsPerSession = 10
*.host4.app[1].requestLength = 200B
*.host4.app[1].replyLength = 1024B
*.host4.app[1].thinkTime = 0.5s
*.host4.app[1].idleInterval = 0.5s

# ======================
# Visualization
# ======================
*.visualizer.*.displayPacketName = true
*.visualizer.*.displayPackets = true
*.visualizer.*.packetFilter = "*"
*.visualizer.*.fadeOutMode = "animationTime"
*.visualizer.*.fadeOutTime = 2s
